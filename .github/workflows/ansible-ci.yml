---
name: Ansible CI

'on':
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core yamllint

      - name: Lint workflow YAML
        run: yamllint .github/workflows/*.yml

      - name: Install required Ansible collections
        run: ansible-galaxy collection install community.general

      - name: Create CI Ansible config without vault password file
        run: |
          grep -vE '^\s*vault_password_file\s*=' ansible.cfg > ansible-ci.cfg

      - name: Ansible playbook syntax check
        env:
          ANSIBLE_CONFIG: ansible-ci.cfg
        run: ansible-playbook --syntax-check -i inventory/hosts.yml playbook.yml
