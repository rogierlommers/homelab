---
name: Ansible CI

'on':
  push:
    paths-ignore:
      - docs/network-diagram.drawio
  pull_request:
    paths-ignore:
      - docs/network-diagram.drawio

jobs:
  validate-ansible-playbook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core yamllint

      - name: Lint YAML files
        run: yamllint --strict $(find . -name '*.yml' -o -name '*.yaml' | grep -v '.github')

      - name: Install required Ansible collections
        run: ansible-galaxy collection install community.general

      - name: Create CI Ansible config without vault password file
        run: |
          grep -vE '^\s*vault_password_file\s*=' ansible.cfg > ansible-ci.cfg

      - name: Ansible playbook syntax check
        env:
          ANSIBLE_CONFIG: ansible-ci.cfg
        run: ansible-playbook --syntax-check -i inventory/hosts.yml playbook.yml
