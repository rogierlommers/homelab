# ln -s ~/dotfiles/dotfiles/mc/ini ~/.config/mc/ini
- name: Symlink ini file for Midnight Commander
  become: false
  ansible.builtin.file:
    src: "/home/rlommers/dotfiles/dotfiles/mc/ini"
    dest: "/home/rlommers/.config/mc/ini"
    state: link
    force: true
  tags: [dotfiles]

- name: Add scripts directory to PATH
  become: true
  ansible.builtin.copy:
    dest: /etc/profile.d/custom-path.sh
    content: 'PATH=$PATH:/home/rlommers/scripts'
  tags: [dotfiles, system]
