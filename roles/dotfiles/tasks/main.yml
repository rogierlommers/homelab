---

# chsh -s /bin/zsh rlommers
- name: Ensure default shell is /bin/zsh
  become: true
  ansible.builtin.user:
    name: "rlommers"
    shell: /bin/zsh
  tags: [dotfiles]

- name: Ensure .config directory exists
  become: false
  ansible.builtin.file:
    path: "/home/rlommers/.config"
    state: directory
    mode: '0755'
  tags: [dotfiles]

- name: Clone dotfiles repository
  become: false
  ansible.builtin.git:
    repo: "git@github.com:rogierlommers/dotfiles.git"
    dest: "/home/rlommers/dotfiles"
    force: true
    accept_hostkey: true
  tags: [dotfiles]

# git clone --depth 1 https://github.com/mattmc3/antidote.git ~/.antidote
- name: Clone antidote zsh plugin manager
  become: false
  ansible.builtin.git:
    repo: "https://github.com/mattmc3/antidote.git"
    dest: "/home/rlommers/.antidote"
    depth: 1
  tags: [dotfiles]

# ln -s ~/dotfiles/dotfiles/scripts ~/scripts
- name: Symlink scripts directory
  become: false
  ansible.builtin.file:
    src: "/home/rlommers/dotfiles/dotfiles/scripts"
    dest: "/home/rlommers/scripts"
    state: link
    force: true
  tags: [dotfiles]

# ln -s ~/dotfiles/dotfiles/tmux/.tmux.conf ~/.tmux.conf
- name: Symlink tmux.conf
  become: false
  ansible.builtin.file:
    src: "/home/rlommers/dotfiles/dotfiles/tmux/.tmux.conf"
    dest: "/home/rlommers/.tmux.conf"
    state: link
    force: true
  tags: [dotfiles]

# ln -s ~/dotfiles/dotfiles/zsh/.zshrc_linux ~/.zshrc
