---

- name: Install Docker
  ansible.builtin.include_tasks: install-docker.yml
  tags: [docker, packages]

- name: Create /srv/local directory
  ansible.builtin.file:
    path: /srv/local
    state: directory
    owner: "rlommers"
    group: "rlommers"
  tags: [system]

# NFS MOUNTS / CLIENT PART

- name: Ensure NFS client packages are installed
  ansible.builtin.package:
    name: nfs-common
    state: present
  tags: [packages, nfs]

- name: Ensure NFS mount point exists
  ansible.builtin.file:
    path: /srv/nas
    state: directory
    owner: "rlommers"
    group: "rlommers"
    mode: '0755'
  tags: [nfs]

- name: Mount NFSv4 share and ensure it persists in fstab
  ansible.posix.mount:
    path: /srv/nas
    src: "{{ nas_ip }}:/srv/nas"
    fstype: nfs4
    opts: "noauto,x-systemd.automount,x-systemd.idle-timeout=1min,_netdev,nofail"
    state: mounted
    boot: false
    dump: 0
    passno: 0
  tags: [nfs]
