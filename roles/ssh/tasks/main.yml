---

- name: Ensure .ssh directory exists
  become: false
  ansible.builtin.file:
    path: "/home/rlommers/.ssh"
    state: directory
    mode: '0700'
  tags: [ssh]

- name: Write id_ed25519 private key
  become: false
  ansible.builtin.template:
    src: id_ed25519.j2
    dest: "/home/rlommers/.ssh/id_ed25519"
    mode: '0600'
  tags: [ssh]

- name: Write id_ed25519 public key
  become: false
  ansible.builtin.template:
    src: id_ed25519.pub.j2
    dest: "/home/rlommers/.ssh/id_ed25519.pub"
    mode: '0644'
  tags: [ssh]

- name: Write Hetzner private key
  become: false
  ansible.builtin.template:
    src: id_ed25519_hetzner.j2
    dest: "/home/rlommers/.ssh/hetzner"
    mode: '0600'
  tags: [ssh]

- name: Write Hetzner public key
  become: false
  ansible.builtin.template:
    src: id_ed25519.pub_hetzner.j2
    dest: "/home/rlommers/.ssh/hetzner.pub"
    mode: '0644'
  tags: [ssh]

- name: Write SSH client config
  become: false
  ansible.builtin.template:
    src: ssh_config.j2
    dest: "/home/rlommers/.ssh/config"
    mode: '0644'
  tags: [ssh]

- name: Add Hetzner storage box SSH config block
  become: false
  ansible.builtin.blockinfile:
    path: "/home/rlommers/.ssh/config"
    create: true
    mode: '0644'
    block: |
      Host {{ hetzner_storagebox_host }}
        HostName {{ hetzner_storagebox_host }}
        User {{ hetzner_storagebox_user }}
        IdentityFile ~/.ssh/hetzner
        Port {{ hetzner_storagebox_port }}
  tags: [ssh]

- name: Disable root login over SSH
  become: true
  ansible.builtin.lineinfile:
    dest: /etc/ssh/sshd_config
    regexp: "^PermitRootLogin"
    line: "PermitRootLogin no"
    state: present
  notify: Restart sshd
  tags: [ssh, security]

- name: Disable password authentication
  become: true
  ansible.builtin.lineinfile:
    dest: /etc/ssh/sshd_config
    regexp: "^PasswordAuthentication"
    line: "PasswordAuthentication no"
    state: present
  notify: Restart sshd
  tags: [ssh, security]

- name: Disable X11 forwarding
  become: true
  ansible.builtin.lineinfile:
    dest: /etc/ssh/sshd_config
    regexp: "^X11Forwarding"
    line: "X11Forwarding no"
    state: present
  notify: Restart sshd
  tags: [ssh, security]

- name: Disable empty passwords
  become: true
  ansible.builtin.lineinfile:
    dest: /etc/ssh/sshd_config
    regexp: "^PermitEmptyPasswords"
    line: "PermitEmptyPasswords no"
    state: present
  notify: Restart sshd
  tags: [ssh, security]
